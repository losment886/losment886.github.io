<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>生日快乐 · 烟花诗词</title>
    <!-- GSAP 动画库 (用于逐字母滚动) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            width: 100vw;
        }

        /* 烟花画布 */
        #fireworksCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 主内容层 (初始隐藏) */
        #content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: none;  /* 验证成功后改为 flex */
            flex-direction: column;
            justify-content: center;  /* 垂直居中 */
            align-items: center;
            pointer-events: none;      /* 让鼠标穿透，但内部文字可能不需要交互 */
            color: white;
            text-align: center;
        }

        /* 生日快乐 - 偏上 */
        .birthday-title {
            font-size: clamp(3rem, 15vw, 8rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(255, 100, 150, 1), 
                         0 0 60px rgba(255, 200, 50, 0.8),
                         4px 4px 8px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            padding: 0.2em 1em;
            border-radius: 2em;
            border: 2px solid rgba(255,215,0,0.5);
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
            margin-bottom: 2rem;        /* 与诗词拉开距离 */
            margin-top: -5vh;           /* 偏上调整 */
            z-index: 25;
            display: inline-block;
            white-space: nowrap;
        }

        /* 诗词容器 */
        .poem-container {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 2rem;
            padding: 2rem 3rem;
            max-width: 800px;
            width: 90%;
            margin-top: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,215,0,0.2);
            z-index: 26;
            pointer-events: auto;       /* 允许选中文字（如果需要） */
            line-height: 1.8;
            font-size: 1.4rem;
            color: #fff8e7;
            text-shadow: 2px 2px 4px #000;
            white-space: pre-wrap;
            word-break: break-word;
            font-weight: 400;
            letter-spacing: 0.02em;
            border-left: 5px solid gold;
        }

        /* 逐字母样式（生日快乐使用） */
        .birthday-title span {
            display: inline-block;
            opacity: 0;
            transform: translateY(80px);
            will-change: transform, opacity;
        }

        /* 登录浮层 */
        #loginOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            background: #1a1a2e;
            padding: 3rem 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 0 50px rgba(255,215,0,0.3), 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #ffd700;
            text-align: center;
            width: 320px;
        }

        .login-box h2 {
            margin-bottom: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: gold;
            text-transform: uppercase;
        }

        .login-box input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 1.8rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid #555;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        .login-box input:focus {
            border-color: gold;
            box-shadow: 0 0 15px gold;
        }

        .login-box button {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.3rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-box button:hover {
            background: #ffdb58;
            box-shadow: 0 0 20px gold;
            transform: scale(1.02);
        }

        .error-message {
            color: #ff6b6b;
            margin-top: 1rem;
            font-size: 0.9rem;
            height: 1.5rem;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            z-index: 30;
        }
    </style>
</head>
<body>

    <!-- 烟花画布 (始终存在，但动画在验证后启动) -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- 登录浮层 -->
    <div id="loginOverlay">
        <div class="login-box">
            <h2>🔐 输入密码</h2>
            <input type="password" id="passwordInput" placeholder="密码" autofocus>
            <button id="loginBtn">进入</button>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <!-- 主内容 (初始隐藏) -->
    <div id="content">
        <h1 class="birthday-title" id="birthdayText">生日快乐</h1>
        <div class="poem-container" id="poemDisplay">
            <!-- 诗词将从gs.txt动态加载 -->
            <p style="text-align: center; opacity:0.8;">🎆 加载诗词中... 🎆</p>
        </div>
    </div>

    <div class="hint">✨ 烟花 · 生日快乐 ✨</div>

    <script>
        (function() {
            // --- 全局变量 ---
            const canvas = document.getElementById('fireworksCanvas');
            const ctx = canvas.getContext('2d');
            let fireworks = [];
            let animationFrame;
            let fireworkInterval = null;
            let gsapInitialized = false;  // 防止重复初始化动画

            // --- 初始化画布尺寸 ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // --- 烟花粒子类 (与之前相同，但增加粒子数量) ---
            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = (Math.random() - 0.5) * 8;
                    this.color = color;
                    this.alpha = 1.0;
                    this.size = Math.random() * 3 + 2;     // 稍微增大
                    this.gravity = 0.03;
                    this.fade = 0.007 + Math.random() * 0.01;
                }
                update() {
                    this.vy += this.gravity;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.alpha -= this.fade;
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            class Firework {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
                    this.particles = [];
                    this.exploded = false;
                }
                explode() {
                    // 增加粒子数量，让烟花更密集 (120~180)
                    const particleCount = 120 + Math.floor(Math.random() * 60);
                    for (let i = 0; i < particleCount; i++) {
                        this.particles.push(new Particle(this.x, this.y, this.color));
                    }
                    this.exploded = true;
                }
                draw() {
                    if (!this.exploded) {
                        // 未爆炸时画一个小火球 (但一般不会看到，因为setTimeout直接爆炸)
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, 5, 0, 2 * Math.PI);
                        ctx.fill();
                    } else {
                        for (let i = this.particles.length - 1; i >= 0; i--) {
                            const p = this.particles[i];
                            p.update();
                            p.draw();
                            if (p.alpha <= 0) {
                                this.particles.splice(i, 1);
                            }
                        }
                    }
                }
            }

            // 生成烟花
            function createFirework() {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.6) + 30; // 上半区
                const fw = new Firework(x, y);
                fireworks.push(fw);
                setTimeout(() => {
                    fw.explode();
                }, Math.random() * 400 + 150); // 稍短延时
            }

            // 动画循环
            function animate() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = fireworks.length - 1; i >= 0; i--) {
                    const fw = fireworks[i];
                    fw.draw();
                    if (fw.exploded && fw.particles.length === 0) {
                        fireworks.splice(i, 1);
                    }
                }
                animationFrame = requestAnimationFrame(animate);
            }

            // 启动烟花 (由验证成功调用)
            function startFireworks() {
                if (fireworkInterval) clearInterval(fireworkInterval);
                // 更密集：每800ms一个，并且一开始多生成几个
                fireworkInterval = setInterval(createFirework, 800);
                // 开场连续几个
                for (let i = 0; i < 5; i++) {
                    setTimeout(createFirework, i * 200);
                }
                // 如果动画未启动，启动它
                if (!animationFrame) {
                    animate();
                }
            }

            // 停止烟花 (登录前不显示)
            function stopFireworks() {
                if (fireworkInterval) {
                    clearInterval(fireworkInterval);
                    fireworkInterval = null;
                }
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
                fireworks = [];
                // 清空画布为黑色
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // --- 逐字母动画 (生日快乐) ---
            function initBirthdayAnimation() {
                if (gsapInitialized) return;
                const title = document.getElementById('birthdayText');
                const text = title.textContent; // "生日快乐"
                // 拆分成单个字符（包括可能存在的空格，但这里无空格）
                const chars = text.split('');
                title.innerHTML = '';
                chars.forEach(char => {
                    const span = document.createElement('span');
                    span.textContent = char;
                    span.style.display = 'inline-block';
                    title.appendChild(span);
                });

                // GSAP 动画：从下往上 + 淡入
                gsap.to('.birthday-title span', {
                    opacity: 1,
                    y: 0,
                    duration: 1.2,
                    stagger: 0.08,
                    ease: 'power3.out',
                    delay: 0.5,
                });
                gsapInitialized = true;
            }

            // --- 加载诗词 (gs.txt) 并显示 ---
            async function loadPoem() {
                try {
                    const response = await fetch('gs.txt');
                    if (!response.ok) throw new Error('诗词文件加载失败');
                    const poem = await response.text();
                    document.getElementById('poemDisplay').innerHTML = `<p style="white-space: pre-line; text-align: center;">${poem}</p>`;
                } catch (e) {
                    document.getElementById('poemDisplay').innerHTML = `<p style="color: #ffaaaa;">诗词加载失败：${e.message}</p>`;
                }
            }

            // --- 密码验证 ---
            async function verifyPassword(inputPwd) {
                try {
                    const response = await fetch('pas.pas');
                    if (!response.ok) throw new Error('密码文件不存在或无法读取');
                    const correctPwd = await response.text();
                    // 去除可能的换行符和空白字符（但保留原样，简单trim）
                    return inputPwd === correctPwd.trim();
                } catch (e) {
                    console.error('密码验证错误:', e);
                    return false;
                }
            }

            // --- 登录成功，显示内容并启动特效 ---
            function onLoginSuccess() {
                // 隐藏登录浮层
                document.getElementById('loginOverlay').style.display = 'none';
                // 显示主内容
                const content = document.getElementById('content');
                content.style.display = 'flex';
                // 加载诗词
                loadPoem();
                // 启动生日快乐逐字母动画
                initBirthdayAnimation();
                // 启动烟花 (多一点)
                startFireworks();
            }

            // --- 绑定登录事件 ---
            document.getElementById('loginBtn').addEventListener('click', async () => {
                const pwdInput = document.getElementById('passwordInput');
                const errorDiv = document.getElementById('loginError');
                const pwd = pwdInput.value;
                if (!pwd) {
                    errorDiv.textContent = '请输入密码';
                    return;
                }
                // 验证密码
                const isValid = await verifyPassword(pwd);
                if (isValid) {
                    errorDiv.textContent = '';
                    onLoginSuccess();
                } else {
                    errorDiv.textContent = '密码错误，请重试';
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            });

            // 按回车键也可以登录
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('loginBtn').click();
                }
            });

            // 初始状态：确保画布黑色，烟花未启动
            stopFireworks();

            // 如果用户直接访问，密码浮层会一直存在
        })();
    </script>

    <noscript>
        <style>body { background: black; color: white; text-align: center; padding-top: 20%; }</style>
        <div>您的浏览器需要启用JavaScript以体验完整效果。</div>
    </noscript>
</body>
</html>
